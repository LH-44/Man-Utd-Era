<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manchester United 1998–99 Treble Squad</title>
  <meta name="description" content="Manchester United 1998-99 Treble squad." />

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container" role="main">
    <header>
      <div class="crest">MU</div>
      <div>
        <h1>Manchester United — 1998–99 Treble Squad</h1>
        <p class="lead">Premier League, FA Cup and UEFA Champions League winners.</p>
      </div>
    </header>

    <div class="grid">
      <main class="main">
        <section class="section">
          <h2>Squad</h2>
          <div class="muted">Click a player for profile</div>
        </section>

        <section class="section squad-grid" id="squadGrid"></section>

        <section class="section">
          <h2>Season Highlights</h2>
          <div class="timeline" id="timeline"></div>
        </section>
      </main>

      <aside class="aside">
        <div class="formation section">
          <h2>Formation</h2>
          <div class="pitch" id="pitch">
            <div class="row">
              <div class="player-pin" data-player-id="1">Schmeichel</div>
            </div>
          </div>
        </div>

        <footer>
          <button id="downloadBtn">Download JSON</button>
        </footer>
      </aside>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="top">
        <div id="modalAvatar" class="avatar"></div>
        <div>
          <div id="modalName"></div>
          <div id="modalPosition"></div>
        </div>
        <button id="modalClose">Close</button>
      </div>
      <div id="modalBio"></div>
      <a id="modalWiki" target="_blank">More</a>
    </div>
  </div>

  <!-- External JS -->
  <script src="script.js"></script>
</body>
</html>
